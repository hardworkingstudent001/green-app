<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenRoute HK</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.4/babel.min.js"></script>
    <style>
        @keyframes scaleIn{from{transform:scale(0.4);opacity:0}to{transform:scale(1);opacity:1}}
        .anim-scale{animation:scaleIn 0.5s ease-out}
        @keyframes fadeSlide{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
        .anim-fade{animation:fadeSlide 0.2s ease-out}
        @keyframes pulse2{0%,100%{opacity:1}50%{opacity:.5}}
        .anim-pulse{animation:pulse2 2s infinite}
        body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    </style>
</head>
<body>

<div id="root">
    <p style="text-align:center;padding:40px;color:#888;font-family:sans-serif;">Loading GreenRoute HK... If this persists, check browser console (F12).</p>
</div>

<script>
window.onerror = function(msg, src, line, col, err) {
    var el = document.getElementById('root');
    if (el) el.innerHTML = '<div style="padding:20px;font-family:monospace;"><h2 style="color:red;">Error Loading App</h2><p>' + msg + '</p><p>Line: ' + line + '</p><pre style="background:#f5f5f5;padding:10px;overflow:auto;font-size:12px;">' + (err && err.stack ? err.stack : '') + '</pre></div>';
};
</script>

<script type="text/babel">
const { useState } = React;

/* ---- Simple Icon Component ---- */
function Ic({ children, size = 16, className = '' }) {
    return (
        <span className={className} style={{
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            width: size, height: size, fontSize: Math.round(size * 0.7), lineHeight: 1, flexShrink: 0
        }}>{children}</span>
    );
}

/* Icons as small components */
const Leaf = (p) => <Ic {...p}>🌿</Ic>;
const MapIc = (p) => <Ic {...p}>🗺️</Ic>;
const Navigation = (p) => <Ic {...p}>🧭</Ic>;
const Trophy = (p) => <Ic {...p}>🏆</Ic>;
const BarChart3 = (p) => <Ic {...p}>📊</Ic>;
const UserIcon = (p) => <Ic {...p}>👤</Ic>;
const HomeIcon = (p) => <Ic {...p}>🏠</Ic>;
const StarIcon = (p) => <Ic {...p}>⭐</Ic>;
const MapPin = (p) => <Ic {...p}>📍</Ic>;
const Bus = (p) => <Ic {...p}>🚌</Ic>;
const Bike = (p) => <Ic {...p}>🚲</Ic>;
const Clock = (p) => <Ic {...p}>🕐</Ic>;
const Zap = (p) => <Ic {...p}>⚡</Ic>;
const Target = (p) => <Ic {...p}>🎯</Ic>;
const Medal = (p) => <Ic {...p}>🏅</Ic>;
const Users = (p) => <Ic {...p}>👥</Ic>;
const Share2 = (p) => <Ic {...p}>📤</Ic>;
const Bell = (p) => <Ic {...p}>🔔</Ic>;
const Settings = (p) => <Ic {...p}>⚙️</Ic>;
const Gift = (p) => <Ic {...p}>🎁</Ic>;
const TrendingDown = (p) => <Ic {...p}>📉</Ic>;
const CheckCircle = (p) => <Ic {...p}>✅</Ic>;
const ShieldCheck = (p) => <Ic {...p}>🛡️</Ic>;
const Flame = (p) => <Ic {...p}>🔥</Ic>;
const Calendar = (p) => <Ic {...p}>📅</Ic>;
const Award = (p) => <Ic {...p}>🏆</Ic>;
const Heart = (p) => <Ic {...p}>❤️</Ic>;
const Eye = (p) => <Ic {...p}>👁️</Ic>;
const RefreshCw = (p) => <Ic {...p}>♻️</Ic>;
const CreditCard = (p) => <Ic {...p}>💳</Ic>;
const Plus = (p) => <Ic {...p}>➕</Ic>;
const ArrowLeft = (p) => <Ic {...p}>←</Ic>;
const ChevronRight = (p) => <Ic {...p}>›</Ic>;

/* ---- Screen IDs ---- */
const S = {
    SPLASH: 'splash', OB1: 'ob1', OB2: 'ob2', OB3: 'ob3',
    SIGNUP: 'signup', OCTOPUS: 'octopus', HOME: 'home',
    MAP: 'map', ROUTES: 'routes', CARBON: 'carbon',
    REPORT: 'report', REWARDS: 'rewards', CHALLENGES: 'challenges',
    LEADER: 'leader', PROFILE: 'profile', FLOWMAP: 'flowmap',
};

/* ---- NavBar ---- */
function NavBar({ active, go }) {
    const items = [
        { id: S.HOME, icon: HomeIcon, label: 'Home' },
        { id: S.MAP, icon: MapIc, label: 'Map' },
        { id: S.CARBON, icon: BarChart3, label: 'Carbon' },
        { id: S.REWARDS, icon: Gift, label: 'Rewards' },
        { id: S.PROFILE, icon: UserIcon, label: 'Profile' },
    ];
    return (
        <div className="flex justify-around items-center bg-white border-t border-gray-200 py-2 px-1 flex-shrink-0">
            {items.map(function(item) {
                return (
                    <button key={item.id} onClick={function(){go(item.id);}}
                        className={active === item.id ? 'flex flex-col items-center gap-0.5 text-green-600' : 'flex flex-col items-center gap-0.5 text-gray-400'}>
                        <item.icon size={17} />
                        <span style={{ fontSize: 10 }}>{item.label}</span>
                    </button>
                );
            })}
        </div>
    );
}

/* ---- Splash ---- */
function SplashScreen({ go }) {
    return (
        <div className="flex flex-col items-center justify-center text-white p-6 bg-gradient-to-b from-green-600 to-green-800 cursor-pointer"
            style={{ minHeight: 500 }} onClick={function(){go(S.OB1);}}>
            <div className="anim-scale">
                <div className="bg-white rounded-full p-5 mb-4"><Leaf size={44} /></div>
            </div>
            <h1 className="text-2xl font-bold mb-1">GreenRoute HK</h1>
            <p className="text-green-200 text-sm text-center mb-10">Low-Carbon Commuting for a Sustainable Hong Kong</p>
            <p className="text-green-300 text-xs anim-pulse">Tap to continue →</p>
        </div>
    );
}

/* ---- Onboarding ---- */
function Onboard({ go, step }) {
    var steps = [
        { icon: MapIc, bgColor: 'bg-green-100', title: 'Compare Carbon Routes', desc: 'See estimated CO₂ for every route. Choose the greenest path to your destination.', next: S.OB2, btn: 'Next' },
        { icon: BarChart3, bgColor: 'bg-blue-100', title: 'Track Your Footprint', desc: 'Weekly carbon reports across travel, food, clothing & living. Auto-sync with Octopus card.', next: S.OB3, btn: 'Next' },
        { icon: Trophy, bgColor: 'bg-yellow-100', title: 'Earn & Redeem Rewards', desc: 'Earn points for green commutes. Complete challenges. Redeem at 7-Eleven, Wellcome & more.', next: S.SIGNUP, btn: 'Get Started' },
    ];
    var data = steps[step];
    var IconComp = data.icon;
    return (
        <div className="flex flex-col items-center justify-between p-6 bg-white" style={{ minHeight: 500 }}>
            <div className="flex-1 flex flex-col items-center justify-center">
                <div className={data.bgColor + ' rounded-full p-6 mb-4'}>
                    <IconComp size={38} />
                </div>
                <h2 className="text-lg font-bold text-gray-800 mb-2">{data.title}</h2>
                <p className="text-gray-500 text-sm text-center leading-relaxed">{data.desc}</p>
                <div className="flex gap-1.5 mt-6">
                    {[0, 1, 2].map(function(i) {
                        return <div key={i} className={i === step ? 'w-6 h-1.5 rounded-full bg-green-600' : 'w-6 h-1.5 rounded-full bg-gray-200'} />;
                    })}
                </div>
            </div>
            <button onClick={function(){go(data.next);}} className="w-full bg-green-600 text-white py-3 rounded-xl font-semibold text-sm mt-4">{data.btn}</button>
        </div>
    );
}

/* ---- Signup ---- */
function SignupScreen({ go }) {
    return (
        <div className="flex flex-col p-6 bg-white" style={{ minHeight: 500 }}>
            <h2 className="text-xl font-bold text-gray-800 mb-1 mt-2">Create Account</h2>
            <p className="text-gray-400 text-xs mb-5">Join Hong Kong's green commuting community</p>
            <div className="space-y-3 flex-1">
                {[['Full Name', 'e.g. Chan Tai Man'], ['Email', 'email@example.com'], ['Password', '••••••••']].map(function(pair) {
                    return (
                        <div key={pair[0]}>
                            <label className="text-xs text-gray-500 mb-1 block">{pair[0]}</label>
                            <div className="border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-400 bg-gray-50">{pair[1]}</div>
                        </div>
                    );
                })}
                <div>
                    <label className="text-xs text-gray-500 mb-1 block">I am a...</label>
                    <div className="flex gap-2 flex-wrap">
                        {['Student', 'Worker', 'Retiree', 'Parent', 'Other'].map(function(t) {
                            return (
                                <span key={t} className={t === 'Student' ? 'text-xs px-3 py-1.5 rounded-full border bg-green-100 border-green-400 text-green-700' : 'text-xs px-3 py-1.5 rounded-full border border-gray-200 text-gray-500'}>{t}</span>
                            );
                        })}
                    </div>
                </div>
            </div>
            <button onClick={function(){go(S.OCTOPUS);}} className="w-full bg-green-600 text-white py-3 rounded-xl font-semibold text-sm mt-4">Continue</button>
            <p className="text-center text-xs text-gray-400 mt-2">Already have an account? <span className="text-green-600 font-medium">Log in</span></p>
        </div>
    );
}

/* ---- Octopus ---- */
function OctopusScreen({ go }) {
    return (
        <div className="flex flex-col items-center justify-between p-6 bg-white" style={{ minHeight: 500 }}>
            <div className="flex-1 flex flex-col items-center justify-center">
                <div className="bg-yellow-50 border-2 border-yellow-300 rounded-2xl p-6 mb-4"><CreditCard size={44} /></div>
                <h2 className="text-lg font-bold text-gray-800 mb-2 text-center">Link Your Octopus Card</h2>
                <p className="text-gray-500 text-sm text-center mb-4">Auto-track MTR, bus & minibus trips and sync carbon data seamlessly.</p>
                <div className="bg-gray-50 rounded-xl p-3 w-full space-y-2">
                    {['Auto-detect public transport trips', 'Calculate carbon saved vs. driving', 'Earn reward points automatically'].map(function(t) {
                        return (
                            <div key={t} className="flex items-center gap-2"><CheckCircle size={15} /><span className="text-xs text-gray-600">{t}</span></div>
                        );
                    })}
                </div>
            </div>
            <div className="w-full space-y-2 mt-4">
                <button onClick={function(){go(S.HOME);}} className="w-full bg-green-600 text-white py-3 rounded-xl font-semibold text-sm">Link Octopus Card</button>
                <button onClick={function(){go(S.HOME);}} className="w-full text-gray-400 py-2 text-sm">Skip for now</button>
            </div>
        </div>
    );
}

/* ---- Home ---- */
function HomeScreen({ go }) {
    var quickBtns = [
        { id: S.MAP, icon: MapIc, label: 'Plan Route' },
        { id: S.CARBON, icon: BarChart3, label: 'My Carbon' },
        { id: S.CHALLENGES, icon: Target, label: 'Challenges' },
        { id: S.LEADER, icon: Medal, label: 'Rank' },
    ];
    return (
        <div className="flex flex-col bg-gray-50" style={{ minHeight: 500 }}>
            <div className="bg-gradient-to-r from-green-600 to-green-700 text-white px-4 pt-3 pb-5 rounded-b-2xl flex-shrink-0">
                <div className="flex justify-between items-center mb-3">
                    <div><p className="text-green-200" style={{ fontSize: 11 }}>Good morning,</p><h2 className="font-bold text-lg">Tai Man 👋</h2></div>
                    <Bell size={17} />
                </div>
                <div className="rounded-xl p-3 flex items-center justify-between" style={{backgroundColor:'rgba(255,255,255,0.2)'}}>
                    <div><p style={{ fontSize: 10 }} className="text-green-100">This Week's Carbon Saved</p><p className="text-2xl font-bold">3.2 <span className="text-sm font-normal">kg CO₂</span></p></div>
                    <div className="text-right"><p style={{ fontSize: 10 }} className="text-green-100">Points</p><p className="text-xl font-bold">⭐ 850</p></div>
                </div>
            </div>
            <div className="flex-1 px-4 pt-3 space-y-2.5 overflow-y-auto pb-1">
                <div className="flex gap-2">
                    {quickBtns.map(function(b) {
                        var BIcon = b.icon;
                        return (
                            <button key={b.id} onClick={function(){go(b.id);}} className="flex-1 bg-white rounded-xl p-2.5 shadow-sm border border-gray-100 flex flex-col items-center gap-1">
                                <BIcon size={20} /><span style={{ fontSize: 10 }} className="font-medium text-gray-700">{b.label}</span>
                            </button>
                        );
                    })}
                </div>
                <div className="bg-white rounded-xl p-3 shadow-sm border border-gray-100">
                    <div className="flex justify-between items-center mb-1.5"><p className="text-sm font-semibold text-gray-800">🔥 Daily Challenge</p><span className="text-xs text-orange-500 font-medium">+50 pts</span></div>
                    <p className="text-xs text-gray-500 mb-2">Take 1 public transport trip today</p>
                    <div className="w-full bg-gray-100 rounded-full h-2"><div className="bg-green-500 rounded-full h-2" style={{ width: '0%' }} /></div>
                    <p style={{ fontSize: 10 }} className="text-gray-400 mt-1">0 / 1 completed</p>
                </div>
                <div className="bg-white rounded-xl p-3 shadow-sm border border-gray-100">
                    <p className="text-sm font-semibold text-gray-800 mb-2">📊 Quick Stats</p>
                    <div className="grid grid-cols-3 gap-2 text-center">
                        <div className="bg-green-50 rounded-lg p-2"><p className="text-lg font-bold text-green-600">12</p><p style={{ fontSize: 10 }} className="text-gray-500">Green Trips</p></div>
                        <div className="bg-blue-50 rounded-lg p-2"><p className="text-lg font-bold text-blue-600">5</p><p style={{ fontSize: 10 }} className="text-gray-500">Badges</p></div>
                        <div className="bg-yellow-50 rounded-lg p-2"><p className="text-lg font-bold text-yellow-600">#28</p><p style={{ fontSize: 10 }} className="text-gray-500">Ranking</p></div>
                    </div>
                </div>
                <div className="bg-green-50 border border-green-200 rounded-xl p-3">
                    <p style={{ fontSize: 10 }} className="text-green-700 font-medium">💡 Tip of the Day</p>
                    <p style={{ fontSize: 10 }} className="text-green-600 mt-1">Walking 2km saves ~0.4kg CO₂ vs taxi. Try walking to nearby MTR!</p>
                </div>
            </div>
            <NavBar active={S.HOME} go={go} />
        </div>
    );
}

/* ---- Map ---- */
function MapScreen({ go }) {
    return (
        <div className="flex flex-col bg-gray-50" style={{ minHeight: 500 }}>
            <div className="bg-white px-4 pt-3 pb-3 border-b border-gray-100 flex-shrink-0">
                <h3 className="font-bold text-gray-800 text-sm mb-2">🗺️ Plan Your Route</h3>
                <div className="space-y-2">
                    <div className="flex items-center gap-2 bg-gray-50 rounded-lg px-3 py-2"><div className="w-2 h-2 bg-green-500 rounded-full" /><span className="text-xs text-gray-500 flex-1">HKUST, Clear Water Bay</span></div>
                    <div className="flex items-center gap-2 bg-gray-50 rounded-lg px-3 py-2"><div className="w-2 h-2 bg-red-500 rounded-full" /><span className="text-xs text-gray-500 flex-1">Central, Hong Kong</span></div>
                </div>
            </div>
            <div className="flex-1 relative cursor-pointer" style={{ background: 'linear-gradient(135deg, #d1fae5 0%, #a7f3d0 40%, #6ee7b7 100%)' }} onClick={function(){go(S.ROUTES);}}>
                <div className="absolute inset-0 flex items-center justify-center">
                    <div className="bg-white rounded-xl p-5 shadow-lg text-center" style={{backgroundColor:'rgba(255,255,255,0.95)'}}>
                        <MapPin size={30} className="mx-auto mb-2" />
                        <p className="text-xs text-gray-700 font-semibold">Interactive Map View</p>
                        <p style={{ fontSize: 10 }} className="text-gray-400 mt-1">🌿 Green spaces highlighted</p>
                        <p style={{ fontSize: 10 }} className="text-gray-400">♻️ Recycling points marked</p>
                        <p style={{ fontSize: 10 }} className="text-green-600 mt-2 font-semibold">Tap to compare routes →</p>
                    </div>
                </div>
                <div className="absolute top-3 right-3 bg-white rounded-lg p-1.5 shadow"><Navigation size={14} /></div>
                <div className="absolute bottom-20 left-4 bg-green-600 text-white rounded-full px-2.5 py-1 flex items-center gap-1" style={{ fontSize: 10 }}>🌿 Kowloon Park</div>
                <div className="absolute bottom-28 right-4 bg-blue-500 text-white rounded-full px-2.5 py-1 flex items-center gap-1" style={{ fontSize: 10 }}>♻️ Recycle Pt</div>
                <div className="absolute top-16 left-6 bg-green-500 text-white rounded-full px-2.5 py-1 flex items-center gap-1" style={{ fontSize: 10 }}>🌿 Victoria Park</div>
            </div>
            <NavBar active={S.MAP} go={go} />
        </div>
    );
}

/* ---- Route Results ---- */
function RouteResults({ go }) {
    var routes = [
        { mode: 'MTR + Walk', icon: Bus, time: '52 min', co2: '0.8 kg', pts: '+40', best: true, bad: false },
        { mode: 'Bus 91M → MTR', icon: Bus, time: '65 min', co2: '1.1 kg', pts: '+30', best: false, bad: false },
        { mode: 'Cycle + MTR', icon: Bike, time: '58 min', co2: '0.5 kg', pts: '+55', best: false, bad: false },
        { mode: 'Taxi', icon: Navigation, time: '35 min', co2: '4.2 kg', pts: '0', best: false, bad: true },
    ];
    return (
        <div className="flex flex-col bg-gray-50" style={{ minHeight: 500 }}>
            <div className="bg-white px-4 pt-3 pb-2 border-b border-gray-100 flex items-center gap-2 flex-shrink-0">
                <button onClick={function(){go(S.MAP);}}><ArrowLeft size={17} /></button>
                <div><h3 className="font-bold text-gray-800 text-sm">Route Comparison</h3><p style={{ fontSize: 10 }} className="text-gray-400">HKUST → Central</p></div>
            </div>
            <div className="flex-1 overflow-y-auto px-4 pt-3 space-y-2 pb-2">
                {routes.map(function(r, i) {
                    var RIcon = r.icon;
                    return (
                        <div key={i} className={r.best ? 'bg-white rounded-xl p-3 border border-green-400 shadow-md relative' : 'bg-white rounded-xl p-3 border border-gray-100 relative'}>
                            {r.best && <span className="absolute -top-2 right-3 bg-green-500 text-white px-2 py-0.5 rounded-full" style={{ fontSize: 10 }}>🌿 Greenest</span>}
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <div className={r.best ? 'p-2 rounded-lg bg-green-100' : 'p-2 rounded-lg bg-gray-100'}><RIcon size={16} /></div>
                                    <div><p className="text-sm font-semibold text-gray-800">{r.mode}</p><p style={{ fontSize: 10 }} className="text-gray-400 flex items-center gap-1"><Clock size={9} /> {r.time}</p></div>
                                </div>
                                <div className="text-right">
                                    <p className={r.bad ? 'text-sm font-bold text-red-500' : 'text-sm font-bold text-green-600'}>{r.co2} CO₂</p>
                                    <p style={{ fontSize: 10 }} className={r.pts === '0' ? 'font-medium text-gray-400' : 'font-medium text-yellow-600'}>{r.pts} pts</p>
                                </div>
                            </div>
                        </div>
                    );
                })}
                <div className="bg-green-50 border border-green-200 rounded-xl p-3 text-center">
                    <p style={{ fontSize: 11 }} className="text-green-700 font-medium">Choosing MTR + Walk saves 3.4 kg CO₂ vs Taxi 🌍</p>
                    <p style={{ fontSize: 10 }} className="text-green-600">That's equivalent to saving 1 tree for a day!</p>
                </div>
                <button onClick={function(){go(S.HOME);}} className="w-full bg-green-600 text-white py-2.5 rounded-xl text-sm font-semibold">Select Greenest Route</button>
            </div>
            <NavBar active={S.MAP} go={go} />
        </div>
    );
}

/* ---- Carbon Dashboard ---- */
function CarbonDash({ go }) {
    var categories = [
        { label: 'Travel', value: 8.2, pct: 44, barColor: 'bg-green-500' },
        { label: 'Food', value: 5.5, pct: 30, barColor: 'bg-orange-500' },
        { label: 'Living', value: 3.3, pct: 18, barColor: 'bg-blue-500' },
        { label: 'Clothing', value: 1.5, pct: 8, barColor: 'bg-purple-500' },
    ];
    var dailyData = [3.2, 2.8, 2.1, 3.5, 2.9, 2.2, 1.8];
    var dayLabels = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
    return (
        <div className="flex flex-col bg-gray-50" style={{ minHeight: 500 }}>
            <div className="bg-white px-4 pt-3 pb-2 border-b border-gray-100 flex-shrink-0">
                <h3 className="font-bold text-gray-800 text-sm">📊 Your Carbon Footprint</h3>
                <p style={{ fontSize: 10 }} className="text-gray-400">Week of 14 – 20 Apr 2026</p>
            </div>
            <div className="flex-1 overflow-y-auto px-4 pt-3 space-y-2.5 pb-2">
                <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
                    <p style={{ fontSize: 10 }} className="text-gray-500 mb-1">Weekly Total</p>
                    <p className="text-3xl font-bold text-gray-800">18.5 <span className="text-sm font-normal text-gray-400">kg CO₂</span></p>
                    <div className="flex items-center justify-center gap-1 mt-1"><TrendingDown size={13} /><span style={{ fontSize: 11 }} className="text-green-600 font-medium">12% less than last week</span></div>
                </div>
                <div className="bg-white rounded-xl p-3 shadow-sm border border-gray-100">
                    <p style={{ fontSize: 11 }} className="font-semibold text-gray-700 mb-2">Breakdown by Category</p>
                    {categories.map(function(cat) {
                        return (
                            <div key={cat.label} className="mb-2">
                                <div className="flex justify-between mb-0.5" style={{ fontSize: 10 }}><span className="text-gray-600">{cat.label}</span><span className="text-gray-500">{cat.value} kg ({cat.pct}%)</span></div>
                                <div className="w-full bg-gray-100 rounded-full h-1.5"><div className={cat.barColor + ' rounded-full h-1.5'} style={{ width: cat.pct + '%' }} /></div>
                            </div>
                        );
                    })}
                </div>
                <div className="bg-white rounded-xl p-3 shadow-sm border border-gray-100">
                    <p style={{ fontSize: 11 }} className="font-semibold text-gray-700 mb-2">Daily Trend (kg CO₂)</p>
                    <div className="flex items-end gap-1 justify-between px-1" style={{ height: 56 }}>
                        {dailyData.map(function(v, i) {
                            return (
                                <div key={i} className="flex flex-col items-center gap-0.5 flex-1">
                                    <div className="bg-green-400 rounded-sm w-full" style={{ height: ((v / 4) * 48) + 'px' }} />

/* ---- Error Boundary ---- */
class ErrorBoundary extends React.Component {
    constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
    }
    static getDerivedStateFromError(error) {
        return { hasError: true, error: error };
    }
    render() {
        if (this.state.hasError) {
            return (
                <div style={{ padding: 20, color: 'red', fontFamily: 'monospace' }}>
                    <h2>Something went wrong</h2>
                    <pre style={{ fontSize: 12, whiteSpace: 'pre-wrap' }}>{this.state.error && this.state.error.toString()}</pre>
                </div>
            );
        }
        return this.props.children;
    }
}

                        var v = entry[1];
                        return (
                            <button key={k} onClick={function(){setScreen(k);}} className={screen === k ? 'text-xs px-2 py-1 rounded-md font-medium bg-green-600 text-white' : 'text-xs px-2 py-1 rounded-md font-medium bg-white text-gray-600 border border-gray-200'}>{v}</button>
                        );
                    })}
                </div>
                {screen === S.FLOWMAP ? (
                    <FlowOverview go={go} />
                ) : (
                    <div className="flex justify-center">
                        <PhoneFrame title={NAMES[screen]}>
                            <div key={screen} className="anim-fade">
                                {renderScreen()}
                            </div>
                        </PhoneFrame>
                    </div>
                )}
                <div className="mt-3 bg-white rounded-xl p-4 shadow-sm max-w-2xl mx-auto">
                    <h3 className="font-bold text-sm text-gray-800 mb-1">Navigation Guide</h3>
                    <p className="text-xs text-gray-500 leading-relaxed">Use the screen tabs above or click directly inside the phone mockup. The Home screen's quick-access buttons navigate to Map, Carbon, Challenges, and Leaderboard. The persistent bottom tab bar provides access to all main sections from any screen. The complete flow proceeds: Splash → Onboarding (×3) → Sign Up → Octopus Link → Home → all core features.</p>
                </div>
            </div>
        </div>
    );
}

/* ---- Render ---- */
try {
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
        React.createElement(ErrorBoundary, null,
            React.createElement(App, null)
        )
    );
} catch(err) {
    document.getElementById('root').innerHTML = '<div style="padding:20px;color:red;font-family:monospace;"><h2>Failed to start app</h2><pre>' + err.message + '</pre></div>';
}
</script>

</body>
</html>
